<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- HLS.js for .m3u8 playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Player Area -->
        <aside class="player-sidebar">
            <div class="brand" onclick="window.location.reload()" style="cursor: pointer;">
                <i class="ph-fill ph-television"></i>
                <h1>Live TV</h1>
            </div>
            
            <div class="player-container">
                <video id="video-player" controls autoplay playsinline></video>
                <div class="player-overlay" id="player-overlay">
                    <i class="ph ph-play-circle"></i>
                    <p>Select a channel to play</p>
                </div>
            </div>

            <div class="now-playing-info">
                <h2 id="current-channel-name">No Channel Selected</h2>
                <p id="current-channel-group">---</p>
            </div>
            
            <!-- Sidebar filters removed, moved to top bar -->
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-actions">
                    <div class="custom-dropdown" id="custom-group-dropdown">
                        <button class="dropdown-trigger" id="dropdown-trigger">
                            <span id="dropdown-selected">All Categories</span>
                            <i class="ph ph-caret-down"></i>
                        </button>
                        <div class="dropdown-menu" id="dropdown-menu">
                            <!-- Options generated by JS -->
                        </div>
                    </div>
                   
                </div>
                <div class="search-bar">
                    <i class="ph-fill ph-microphone" id="voice-search-icon" title="Voice Search"></i>
                    <i class="ph ph-magnifying-glass" id="search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search channels...">
                    <i class="ph ph-x" id="clear-search-icon" title="Clear Search" style="display: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; margin-left: 0.5rem; transition: color 0.2s;"></i>
                </div>
                 <div class="stats">
                        <span id="channel-count">0</span> Channels
                 </div>
            </header>

            <!-- Loader -->
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <p>Loading channels from IPTV... This might take a moment.</p>
            </div>

            <div class="channels-grid" id="channels-grid">
                <!-- Channel cards will be generated here by JS -->
            </div>
            
            <div class="pagination-controls" id="pagination-controls" style="display: none;">
                <button id="prev-page" class="btn"><i class="ph ph-caret-left"></i> Previous</button>
                <span id="page-info">Page 1 of X</span>
                <button id="next-page" class="btn">Next <i class="ph ph-caret-right"></i></button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
